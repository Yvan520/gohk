<script>
function filterStories(category) {
  const btns = document.querySelectorAll('.filter-btn-s');
  btns.forEach(b => b.classList.remove('active'));
  if (event && event.currentTarget) event.currentTarget.classList.add('active');
  else btns[0].classList.add('active');

  const catMap = { night:'🌇', food:'🍜', healing:'💛', family:'👨', solo:'🎒' };
  document.querySelectorAll('#storiesContainer .story-card').forEach(card => {
    if (card.id === 'emptyState') return;
    const tag = card.querySelector('.tag');
    if (!tag) { card.style.display = ''; return; }
    const cat = tag.textContent.trim();
    if (category === 'all') { card.style.display = ''; return; }
    card.style.display = cat.startsWith(catMap[category] || '') ? '' : 'none';
  });
}
</script>
