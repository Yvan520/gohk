<!DOCTYPE html>

<head>

<title>香港故事 | SunnyHK 留言板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
.tag-select { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-option {
  padding: 8px 16px; border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--bg-warm); cursor: pointer;
  font-size: 0.85rem; transition: all var(--transition);
  font-family: var(--font-sans); color: var(--text-light);
}
.tag-option:hover { border-color: var(--brand); color: var(--brand); }
.tag-option.selected { background: var(--brand); color: white; border-color: var(--brand); }
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px;
}
.filter-btn-s {
  padding: 8px 18px; border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--card-bg); cursor: pointer;
  font-size: 0.85rem; transition: all var(--transition);
  font-family: var(--font-sans); color: var(--text-light);
}
.filter-btn-s:hover { border-color: var(--brand); color: var(--brand); }
.filter-btn-s.active { background: var(--brand); color: white; border-color: var(--brand); }
</style>
</head>
<body>

<nav class="navbar">
  <div class="inner">
    <a href="index.html" class="logo">
      <div class="sun"><i class="fas fa-sun"></i></div>
      Sunny<span>HK</span>
    </a>
    <div class="nav-links">
      <a href="index.html">首頁</a>
      <a href="explore.html">探索指南</a>
      <a href="stories.html" class="active">香港故事</a>
      <a href="about.html">關於</a>
    </div>
    <div class="nav-actions">
      <button class="lang-toggle" onclick="if(window.SunnyLang)window.SunnyLang.toggleLang()">简</button>
      <button class="theme-toggle" id="themeToggle" aria-label="切換主題"><i class="fas fa-moon"></i></button>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="選單">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<div class="mobile-overlay" id="mobileOverlay"></div>
<div class="mobile-drawer" id="mobileDrawer">
  <a href="index.html">首頁</a>
  <a href="explore.html">探索指南</a>
  <a href="stories.html">香港故事</a>
  <a href="about.html">關於</a>
  <button class="lang-toggle" onclick="if(window.SunnyLang)window.SunnyLang.toggleLang()" style="margin-top:16px;">简</button>
  <button class="theme-toggle" id="themeToggleMobile" aria-label="切換主題" style="margin-top:8px;align-self:flex-start;"><i class="fas fa-moon"></i></button>
</div>

<div class="page-header">
  <div class="inner">
    <h1>💬 香港故事 · 分享你嘅嗰一日</h1>
    <p>每一個嚟過嘅人，都留低咗一瞬心動。你都可以。</p>
  </div>
</div>

<section class="section">
  <div class="inner" style="max-width: 900px;">

    <div class="story-form fade-in">
      <h3>✏️ 寫低你嘅香港瞬間</h3>
      <p class="hint">分享你喺香港最難忘嘅回憶，可能你嘅故事會成為別人嘅旅行靈感。</p>
      <form id="storyForm">
        <div class="form-row">
          <div class="form-group">
            <label>稱呼</label>
            <input type="text" id="storyNickname" placeholder="你嘅名字" maxlength="30">
          </div>
          <div class="form-group">
            <label>來自邊度</label>
            <input type="text" id="storyOrigin" placeholder="深圳 / 上海 / 東京 ...">
          </div>
        </div>
        <div class="form-group">
          <label>故事分類</label>
          <select id="storyCategory">
            <option value="night">🌇 最美夜景</option>
            <option value="food">🍜 最難忘嘅一餐</option>
            <option value="healing">💛 最治癒嘅一刻</option>
            <option value="family">👨‍👩‍👧 親子回憶</option>
            <option value="solo">🎒 一個人嘅旅行</option>
          </select>
        </div>
        <div class="form-group">
          <label>你嘅故事</label>
          <textarea id="storyMessage" rows="4" placeholder="嗰日喺香港..." required></textarea>
        </div>
        <button type="submit" class="submit-btn"><i class="fas fa-paper-plane" style="margin-right:8px;"></i> 發佈故事</button>
      </form>
    </div>

    <div class="filter-bar">
      <button class="filter-btn-s active" onclick="filterStories('all')">全部故事</button>
      <button class="filter-btn-s" onclick="filterStories('night')">🌇 夜景</button>
      <button class="filter-btn-s" onclick="filterStories('food')">🍜 美食</button>
      <button class="filter-btn-s" onclick="filterStories('healing')">💛 治癒</button>
      <button class="filter-btn-s" onclick="filterStories('family')">👨‍👩‍👧 親子</button>
      <button class="filter-btn-s" onclick="filterStories('solo')">🎒 獨旅</button>
    </div>

    <div class="stories-grid" id="storiesContainer">
      <div class="story-card" style="text-align:center;padding:48px 24px;grid-column:1/-1;">
        <div style="font-size:3rem;margin-bottom:16px;">💬</div>
        <p style="color:var(--text-muted);">載入中...</p>
      </div>
    </div>

  </div>
</section>

<footer class="footer">
  <div class="inner">
    <div class="footer-grid">
      <div class="footer-brand">
        <div class="logo-text">
          <div class="sun"><i class="fas fa-sun"></i></div>
          SunnyHK
        </div>
        <p>一個年輕、陽光、真實嘅香港旅行靈感平台。</p>
      </div>
      <div class="footer-col">

        <a href="explore.html">人群指南</a>
        <a href="explore.html#quiet">發呆地圖</a>
        <a href="stories.html">香港故事</a>
      </div>
      <div class="footer-col">
        <h4>關於</h4>
        <a href="about.html">關於 SunnyHK</a>
        <a href="about.html#faq">常見問題</a>
      </div>
      <div class="footer-col">
        <h4>關注我哋</h4>
        <div class="footer-social">
          <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
          <a href="#" aria-label="小紅書"><i class="fab fa-xiaohongshu"></i></a>
          <a href="#" aria-label="微博"><i class="fab fa-weibo"></i></a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <span>&copy; 2026 SunnyHK · Discover Your Own Hong Kong</span>
    </div>
  </div>
</footer>

<script src="js/lang.js"></script>
<script src="js/main.js"></script>
<script>
function filterStories(category) {
  const btns = document.querySelectorAll('.filter-btn-s');
  btns.forEach(b => b.classList.remove('active'));
  if (event && event.currentTarget) event.currentTarget.classList.add('active');
  else btns[0].classList.add('active');

  const catMap = { night:'🌇', food:'🍜', healing:'💛', family:'👨', solo:'🎒' };
  document.querySelectorAll('#storiesContainer .story-card').forEach(card => {
    if (card.id === 'emptyState') return;
    const tag = card.querySelector('.tag');
    if (!tag) { card.style.display = ''; return; }
    const cat = tag.textContent.trim();
    if (category === 'all') { card.style.display = ''; return; }
    card.style.display = cat.startsWith(catMap[category] || '') ? '' : 'none';
  });
}
</script>
</body>
</html>
