name: 每日自動內容更新
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-daily-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate daily content
        run: node scripts/daily-content.js

      - name: Commit and push changes
        run: |
          git config user.name "SunnyHK Bot"
          git config user.email "bot@sunnnyhk.com"
          git add -A
          git diff --cached --quiet || git commit -m "daily: $(date -u '+%Y-%m-%d') content update"
          git push
